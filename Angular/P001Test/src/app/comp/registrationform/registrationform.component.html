<div>
  <h4 class="text-info">{{this.fromHeading}}</h4>
  <br/>
  <div class="container-fluid">
    <div class="col-md-5">
    <form class="form-horizontal" (submit)="onSubmit()">
      <div class="form-group">
        <label for="inputEmail" class="col-sm-2 control-label">Name</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" id="name" placeholder="Name">
        </div>
      </div>
      <div class="form-group">
        <label for="inputEmail" class="col-sm-2 control-label">Email</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" id="inputEmail" placeholder="Email">
        </div>
      </div>
      <div class="form-group">
        <label for="inputAddress" class="col-sm-2 control-label">Address</label>
        <div class="col-sm-10">
          <input type="text" class="form-control" id="inputAddress" placeholder="Address">
        </div>
      </div>
      <div class="form-group">
        <label for="inputAddress" class="col-sm-2 control-label">Date</label>
        <div class="col-sm-10">
          <input type="date" class="form-control" id="inputDate" placeholder="Date">
        </div>
      </div>
      <div class="form-group">
        <div class="col-sm-4">
          <input class="btn btn-sm" type="submit" class="form-control" id="submit" value="Register">
        </div>
      </div>
    </form>
    </div>
  </div>
</div>
