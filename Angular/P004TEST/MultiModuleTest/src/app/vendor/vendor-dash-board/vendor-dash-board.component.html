<div class="row">
  <div class="col-md-4">
    <h3>Vendor Registration</h3>

    <form [formGroup]="vendorFromGroup">
        <div class="form-group">
            <label>Name of vendor</label>
            <input class="form-control" type="text" name="vendorName" id="vendorName" [formControl]="vendorName"/>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input class="form-control" type="text" name="vendorEmail" id="vendorEmail" [formControl]="vendorEmail" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input class="form-control" type="text" name="vendorPhone" id="vendorPhone" [formControl]="vendorPhone"/>
      </div>
  </form>

  </div>
</div>
