<h2>Business List</h2>

<div class="row">

<div class="col-md-6">
<h6>Activity List</h6>
<ol>
  <li *ngFor="let listEl of activityList;">
    <strong>{{listEl.activity}}</strong> <small>{{listEl.managerName}}</small>
  </li>
</ol>
</div>
<div class="col-md-6">
  <form>
      <div class="form-group" id="form-group">
        <label for="business-activity">Business Activity</label>
        <input [(ngModel)]="crActibity.activity" name="business-activity" type="text" class="form-control" id="business-activity" aria-describedby="business-activity" placeholder="Business Activity">
      </div>
      
      <div class="form-group">
        <label for="manager-name">Manager Name</label>
        <input [(ngModel)]="crActibity.managerName" name="manager-name" type="text" class="form-control" id="manager-name" aria-describedby="manager-name" placeholder="Manager Name">
      </div>

      <div class="form-group">
        <input (click)="addActivity()" type="button" class="form-control btn btn-dark" id="submit" value="add">
      </div>
  </form>  
  
</div>

</div>
